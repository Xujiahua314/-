<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>景区路径规划系统</title>
    <style>
        :root {
            --bg: #f0f4f3;
            --card-bg: #ffffff;
            --primary: #2d6a4f;
            --primary-hover: #1b4332;
            --accent: #40916c;
            --text: #1b4332;
            --text-light: #555;
            --border: #d8e2dc;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --danger: #c62828;
            --warning: #e65100;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 50%, #40916c 100%);
            color: #fff;
            padding: 14px 32px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .header .logo { font-size: 28px; }
        .header h1 { font-size: 21px; font-weight: 600; letter-spacing: 2px; }
        .header .subtitle { font-size: 13px; opacity: 0.85; margin-left: auto; }

        .main-container {
            display: flex;
            gap: 18px;
            padding: 18px;
            max-width: 1400px;
            margin: 0 auto;
            height: calc(100vh - 170px);
            min-height: 580px;
        }

        /* ===== Canvas 面板 ===== */
        .canvas-panel {
            flex: 1 1 62%;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .canvas-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }
        .canvas-header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--primary); }
        .canvas-header .hint {
            margin-left: auto;
            font-size: 11px;
            font-weight: 400;
            color: #999;
        }
        #mapCanvas { flex: 1; width: 100%; cursor: pointer; }

        /* ===== 右侧面板 ===== */
        .control-panel {
            flex: 0 0 370px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 15px;
        }
        .card h3 {
            font-size: 14px;
            color: var(--primary);
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card h3 .icon { font-size: 17px; }

        .btn-group { display: flex; flex-wrap: wrap; gap: 7px; }
        .btn {
            padding: 7px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #f8faf9;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            white-space: nowrap;
        }
        .btn:hover { background: #e8f5e9; border-color: var(--accent); }
        .btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
        .btn.primary:hover { background: var(--primary-hover); }
        .btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn.warn { background: var(--warning); color: #fff; border-color: var(--warning); }

        .input-row {
            display: flex; gap: 6px; margin-bottom: 6px; align-items: center;
        }
        .input-row label { font-size: 12px; white-space: nowrap; min-width: 38px; color: var(--text-light); }
        .input-row select {
            flex: 1; padding: 6px 8px;
            border: 1px solid var(--border); border-radius: 4px;
            font-size: 13px; font-family: inherit;
        }
        .input-row select:focus { outline: none; border-color: var(--accent); }

        .result-area {
            background: #f8faf9;
            border-radius: 4px;
            padding: 12px;
            font-size: 13px;
            line-height: 1.8;
            max-height: 220px;
            overflow-y: auto;
            font-family: "Consolas", "Courier New", monospace;
        }
        .result-area .hili { color: var(--danger); font-weight: bold; }
        .result-area .pat { color: #1b5e20; font-weight: bold; }
        .result-area .dis { color: var(--primary); font-weight: bold; }

        .matrix-table {
            width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 6px;
        }
        .matrix-table th, .matrix-table td {
            border: 1px solid var(--border); padding: 4px 5px; text-align: center;
        }
        .matrix-table th { background: var(--primary); color: #fff; font-weight: 500; }
        .matrix-table td.inf { color: #999; }

        .status-bar {
            margin: 0 18px 18px;
            padding: 8px 16px;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            font-size: 12px;
            color: var(--text-light);
            display: flex; gap: 20px; align-items: center;
        }
        .legend { display: flex; gap: 14px; align-items: center; }
        .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }

        /* ===== 景点详情弹窗 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.55);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.25s ease;
        }
        .modal-overlay.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal {
            background: #fff;
            border-radius: 12px;
            width: 560px;
            max-width: 95vw;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }
        .modal-body { padding: 20px 24px; }
        .modal-body h2 {
            font-size: 22px;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .modal-body .spot-tag {
            display: inline-block;
            background: #e8f5e9;
            color: var(--primary);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 14px;
        }
        .modal-body .info-row {
            display: flex; gap: 20px; margin-bottom: 14px;
            font-size: 13px; color: var(--text-light);
        }
        .modal-body .info-row span strong { color: var(--text); }
        .modal-body .desc {
            font-size: 14px; line-height: 1.9; color: #444;
            text-indent: 2em; margin-bottom: 12px;
        }
        .modal-body .nearby { font-size: 12px; color: #888; margin-top: 8px; }
        .modal-body .nearby a { color: var(--accent); cursor: pointer; text-decoration: underline; }
        .modal-close {
            position: sticky; top: 0; float: right;
            background: rgba(255,255,255,0.9); border: none;
            width: 36px; height: 36px; border-radius: 50%;
            font-size: 20px; cursor: pointer; margin: 10px 10px 0 0;
            z-index: 10; color: #333;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        .modal-close:hover { background: #fff; }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; height: auto; }
            .canvas-panel { min-height: 380px; }
            .control-panel { flex: none; }
            .modal { width: 95vw; }
        }
    </style>
</head>
<body>

<div class="header">
    <span class="logo">🏔️</span>
    <h1>景区路径规划系统</h1>
    <span class="subtitle">数据结构实训 — 许嘉华 202509604228</span>
</div>

<div class="main-container">
    <!-- 左侧 Canvas -->
    <div class="canvas-panel">
        <div class="canvas-header">
            <span class="dot"></span> 景区景点分布图
            <span class="hint">💡 点击图中景点可查看详细介绍</span>
        </div>
        <canvas id="mapCanvas"></canvas>
    </div>

    <!-- 右侧控制面板 -->
    <div class="control-panel" id="controlPanel">
        <!-- 功能菜单 -->
        <div class="card">
            <h3><span class="icon">🎛️</span> 功能菜单</h3>
            <div class="btn-group">
                <button class="btn primary" onclick="loadPreset()">📥 加载预设数据</button>
                <button class="btn" onclick="displayMatrix()">📊 展示邻接矩阵</button>
                <button class="btn" onclick="dfsTour()">🗺️ DFS 导游线路</button>
                <button class="btn warn" onclick="detectCycle()">🔁 回路检测</button>
                <button class="btn accent" onclick="showDijkstra()">📏 最短路径查询</button>
                <button class="btn primary" onclick="primMST()">🌳 最小生成树</button>
            </div>
        </div>

        <!-- 景点查询 -->
        <div class="card">
            <h3><span class="icon">🔍</span> 景点查询</h3>
            <div class="input-row">
                <label>选择景点：</label>
                <select id="spotSelect" onchange="onSpotSelect()">
                    <option value="">-- 请先加载数据 --</option>
                </select>
            </div>
            <button class="btn primary" onclick="viewSelectedSpot()" style="margin-top:6px;width:100%;">
                📖 查看景点详情
            </button>
            <div style="font-size:11px;color:#999;margin-top:6px;">
                💡 也可在左侧分布图中直接点击景点圆形图标
            </div>
        </div>

        <!-- 最短路径查询 -->
        <div class="card" id="dijkstraCard" style="display:none;">
            <h3><span class="icon">📏</span> 最短路径查询（Dijkstra）</h3>
            <div class="input-row"><label>起点：</label><select id="dijkFrom"></select></div>
            <div class="input-row"><label>终点：</label><select id="dijkTo"></select></div>
            <button class="btn accent" onclick="runDijkstra()">🔍 查询最短路径</button>
            <div id="dijkResult" class="result-area" style="margin-top:8px; display:none;"></div>
        </div>

        <!-- 输出结果 -->
        <div class="card">
            <h3><span class="icon">📋</span> 输出结果</h3>
            <div class="result-area" id="outputArea"><em>点击"加载预设数据"开始使用系统</em></div>
        </div>
    </div>
</div>

<!-- 景点详情弹窗 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modal" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModalDirect()">✕</button>
        <div class="modal-body" style="padding-top:10px;">
            <h2 id="modalTitle"></h2>
            <span class="spot-tag" id="modalTag"></span>
            <div class="info-row">
                <span>📍 编号：<strong id="modalId"></strong></span>
                <span>🔗 邻接景点：<strong id="modalNeighbors"></strong></span>
            </div>
            <div class="desc" id="modalDesc"></div>
            <div class="nearby" id="modalNearby"></div>
        </div>
    </div>
</div>

<!-- 底部状态栏 -->
<div class="status-bar">
    <span id="statusText">🟢 就绪</span>
    <span style="margin-left:auto;">景点数：<strong id="spotCount">0</strong></span>
    <span>边数：<strong id="edgeCount">0</strong></span>
    <div class="legend">
        <span class="legend-item"><span class="legend-dot" style="background:#2d6a4f;"></span> 景点</span>
        <span class="legend-item"><span class="legend-dot" style="background:#e63946;"></span> 最短路径</span>
        <span class="legend-item"><span class="legend-dot" style="background:#457b9d;"></span> DFS线路</span>
        <span class="legend-item"><span class="legend-dot" style="background:#e65100;"></span> 回路</span>
    </div>
</div>

<script>
// ==================== 全局状态 ====================
const INF = 32767;
let spots = [];
let adjList = new Map();
let adjMatrix = [];
let tourPath = [];
let highlightEdges = [];

// ==================== 景点介绍数据 ====================
const spotInfoMap = {

    },

        desc: "碧玉潭因潭水碧绿如玉而得名，是景区内最负盛名的水景。潭深约三丈，水质清澈见底，水下卵石历历可数。相传唐代诗人李白游历至此，见潭水澄澈如镜、倒映青山翠竹，不禁赞叹"此水只应天上有"。潭边建有凉亭一座，供游人休憩赏景。夏日荷花开遍潭面，清香四溢；秋日枫叶倒映水中，红绿交织，美不胜收。"
    },
    "红叶林": {
        tag: "🍁 秋色",
        desc: "红叶林占地约五十亩，栽种了数千棵鸡爪槭和红枫。每年十月至十一月，整片山林层林尽染，从橙黄到深红，层次分明，宛如一幅浓墨重彩的油画。林间铺设了蜿蜒的木栈道，游客穿行其中，脚下落叶沙沙作响，抬头红叶遮天蔽日。摄影爱好者常在此蹲守日出和日落时分，捕捉光影穿透红叶的绝美瞬间。红叶林也是景区最大的天然氧吧，负氧离子含量极高。"
    },
    "赏花园": {
        tag: "🌸 花卉",
        desc: "赏花园是一座典型的江南园林式花园，占地约二十亩。园中按季节分片种植了牡丹、芍药、菊花、梅花等传统名花，确保四季有花可赏。春季牡丹盛开时最为热闹，姹紫嫣红、争奇斗艳，吸引无数游客驻足拍照。园中还有一座小巧精致的假山和曲水流觞的景观小品，充满了文人雅趣。每年四月举办的"百花节"是景区最盛大的活动之一。"
    },
    "飞云石": {
        tag: "🪨 奇石",
        desc: "飞云石是一块高达十余米的巨型花岗岩，因其形状奇特、宛如一朵凝固的飞云而得名。岩石表面布满了千百年来风雨侵蚀形成的纹理，远观如行云流水，近看似龙鳞虎斑。地质学家考证，此石形成于约两亿年前的中生代，是地壳运动的产物。石顶有一小平台，胆大的游客可攀登至顶，俯瞰整个景区的壮丽景色。当地流传着"摸飞云石、好运即来"的说法，岩石下部已被游人摸得光滑发亮。",
    },
    "九曲桥": {
        tag: "🌉 古桥",
        desc: "九曲桥是一座横跨碧玉潭的古典石拱桥，全长约五十米，桥身九折九曲，寓意"九曲十八弯，步步高升"。桥面铺设青石板，两侧有精致的石雕栏杆，栏板上雕刻着梅兰竹菊和祥云瑞兽图案。据说此桥由清代一位告老还乡的工部侍郎捐资修建，桥成之日有九只白鹤盘旋其上，被视为祥瑞之兆。漫步桥上，移步换景，每一个转角都能看到不同的湖光山色。",
    },
    "白虎岩": {
        tag: "🐯 奇石",
        desc: "白虎岩因山体岩石呈白色，且形似一只匍匐欲扑的猛虎而得名。岩石主体为白色石英岩，在阳光照射下银光闪闪，与周围的苍翠树林形成鲜明对比。虎头部位面向西方，恰合传统文化中"白虎"为西方神兽的说法，被当地人视为镇山灵石。岩下有天然形成的岩洞，洞内钟乳石千姿百态，夏季洞内凉爽如秋，是避暑纳凉的好去处。每年端午，当地百姓有在此舞龙祈福的习俗。",
    },
    "观月阁": {
        tag: "🏯 楼阁",
        desc: "观月阁坐落于景区最高处的翠微峰顶，是一座三层飞檐攒尖顶的仿古建筑。阁高约二十米，朱柱碧瓦，飞檐翘角，气势不凡。登上阁楼顶层，极目远眺，可将整个景区及周边数十里山水尽收眼底。每逢中秋之夜，一轮圆月从东山升起，清辉洒满山川，阁中赏月已成为当地最富盛名的风雅活动。历代文人墨客在此留下了大量诗词题咏，阁内至今保存着十余块碑刻。",
    }
};

// ==================== Canvas ====================
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
let nodePositions = [];

function resizeCanvas() {
    const panel = canvas.parentElement;
    canvas.width = panel.clientWidth - 2;
    canvas.height = panel.clientHeight - 42;
    drawGraph();
}
window.addEventListener('resize', () => { resizeCanvas(); });
resizeCanvas();

// ==================== 数据操作 ====================
function rebuildMatrix() {
    const n = spots.length;
    adjMatrix = Array.from({ length: n }, () => Array(n).fill(INF));
    for (let i = 0; i < n; i++) adjMatrix[i][i] = 0;
    for (let [from, edges] of adjList) {
        for (let { to, weight } of edges) {
            adjMatrix[from][to] = weight;
            adjMatrix[to][from] = weight;
        }
    }
}

function updateSelects() {
    const sels = ['dijkFrom','dijkTo','spotSelect'];
    sels.forEach(id => {
        const sel = document.getElementById(id);
        if (!sel) return;
        const v = sel.value;
        if (id === 'spotSelect') {
            sel.innerHTML = '<option value="">-- 选择景点 --</option>' +
                spots.map((s,i) => `<option value="${i}">[${i}] ${s}</option>`).join('');
        } else {
            sel.innerHTML = spots.map((s,i) => `<option value="${i}">${s}</option>`).join('');
        }
        if (v !== '' && parseInt(v) < spots.length) sel.value = v;
    });
    document.getElementById('spotCount').textContent = spots.length;
    let ec = 0;
    for (let edges of adjList.values()) ec += edges.length;
    document.getElementById('edgeCount').textContent = Math.floor(ec / 2);
}

// ==================== Canvas 绘制 ====================
function computeNodePositions() {
    const n = spots.length;
    const w = canvas.width, h = canvas.height;
    const cx = w / 2, cy = h / 2;
    const rx = Math.min(w, h) * 0.37;
    const ry = Math.min(w, h) * 0.30;
    const pos = [];
    for (let i = 0; i < n; i++) {
        const angle = (2 * Math.PI * i) / n - Math.PI / 2;
        pos.push({ x: cx + rx * Math.cos(angle), y: cy + ry * Math.sin(angle) });
    }
    return pos;
}

function drawGraph() {
    if (!canvas.width || !canvas.height) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (spots.length === 0) {
        ctx.fillStyle = '#aaa';
        ctx.font = '16px "Microsoft YaHei", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('暂无景点数据，请点击"加载预设数据"', canvas.width / 2, canvas.height / 2);
        nodePositions = [];
        return;
    }

    nodePositions = computeNodePositions();
    const pos = nodePositions;

    // 高亮边集合
    const hlSet = new Set();
    for (let h of highlightEdges) {
        hlSet.add(`${h.from},${h.to}`);
        hlSet.add(`${h.to},${h.from}`);
    }

    // 绘边
    const drawn = new Set();
    for (let [from, edges] of adjList) {
        for (let { to, weight } of edges) {
            const key = `${Math.min(from, to)},${Math.max(from, to)}`;
            if (drawn.has(key)) continue;
            drawn.add(key);

            const x1 = pos[from].x, y1 = pos[from].y;
            const x2 = pos[to].x, y2 = pos[to].y;
            const isHL = hlSet.has(`${from},${to}`);

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            const hlEdge = highlightEdges.find(h =>
                (h.from === from && h.to === to) || (h.from === to && h.to === from));
            ctx.strokeStyle = isHL ? (hlEdge?.color || '#e63946') : '#bbb';
            ctx.lineWidth = isHL ? 3.5 : 2;
            ctx.stroke();

            // 权重标签
            const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
            const angle = Math.atan2(y2 - y1, x2 - x1);
            ctx.fillStyle = isHL ? '#000' : '#666';
            ctx.font = 'bold 13px "Consolas", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(weight, mx + 12 * Math.sin(angle), my - 12 * Math.cos(angle));
        }
    }

    // 绘节点
    for (let i = 0; i < spots.length; i++) {
        const { x, y } = pos[i];
        const inTour = tourPath.includes(i);

        // 阴影
        ctx.beginPath();
        ctx.arc(x + 2, y + 2, 26, 0, 2 * Math.PI);
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fill();

        // 圆形
        ctx.beginPath();
        ctx.arc(x, y, 26, 0, 2 * Math.PI);
        ctx.fillStyle = inTour ? '#e8f5e9' : '#fff';
        ctx.fill();
        ctx.strokeStyle = inTour ? '#2d6a4f' : '#555';
        ctx.lineWidth = inTour ? 3 : 2;
        ctx.stroke();

        // 编号
        ctx.fillStyle = '#999';
        ctx.font = '10px "Consolas", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(i, x - 31, y - 15);

        // 名称
        ctx.fillStyle = '#1b4332';
        ctx.font = 'bold 13px "Microsoft YaHei", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const label = spots[i].length > 3 ? spots[i].substring(0, 3) : spots[i];
        ctx.fillText(label, x, y);

        // 光标提示
        ctx.fillStyle = '#40916c';
        ctx.font = '9px "Microsoft YaHei", sans-serif';
        ctx.fillText('🔍', x + 20, y - 18);
    }
}

// ==================== Canvas 点击检测 ====================
canvas.addEventListener('click', function(e) {
    if (spots.length === 0) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const cx = mx * scaleX;
    const cy = my * scaleY;

    for (let i = 0; i < nodePositions.length; i++) {
        const { x, y } = nodePositions[i];
        const dist = Math.sqrt((cx - x) ** 2 + (cy - y) ** 2);
        if (dist <= 26) {
            showSpotDetail(i);
            return;
        }
    }
});

// ==================== 功能：加载预设数据 ====================
function loadPreset() {
    // 重置
    spots = [];
    adjList = new Map();
    adjMatrix = [];
    tourPath = [];
    highlightEdges = [];

    const presetSpots = ['大门', '碧玉潭', '红叶林', '赏花园', '飞云石', '九曲桥', '白虎岩', '观月阁'];
    const presetEdges = [
        [0,1,5], [0,2,8], [1,3,3], [2,3,4],
        [2,4,6], [3,4,2], [4,5,7], [5,6,4], [6,7,5]
    ];
    for (let s of presetSpots) {
        spots.push(s);
        adjList.set(spots.length - 1, []);
    }
    for (let [u, v, w] of presetEdges) {
        adjList.get(u).push({ to: v, weight: w });
        adjList.get(v).push({ to: u, weight: w });
    }
    rebuildMatrix();
    updateSelects();
    drawGraph();
    setStatus('✅ 已加载预设数据：' + spots.length + '个景点，9条边');
    outputToArea('预设数据加载成功！\n\n景点列表（点击景点名称或分布图上的圆形图标可查看详情）：\n' +
        spots.map((s,i) => `  [${i}] ${s}`).join('\n') +
        '\n\n边列表（9条）：\n  大门—碧玉潭(5)  大门—红叶林(8)\n' +
        '  碧玉潭—赏花园(3)  红叶林—赏花园(4)\n' +
        '  红叶林—飞云石(6)  赏花园—飞云石(2)\n' +
        '  飞云石—九曲桥(7)  九曲桥—白虎岩(4)\n' +
        '  白虎岩—观月阁(5)');
}

// ==================== 功能：展示邻接矩阵 ====================
function displayMatrix() {
    if (spots.length === 0) { alert('请先加载数据'); return; }
    rebuildMatrix();
    const n = spots.length;
    let html = '<table class="matrix-table"><thead><tr><th>景点</th>';
    for (let i = 0; i < n; i++) html += `<th>${spots[i]}</th>`;
    html += '</tr></thead><tbody>';
    for (let i = 0; i < n; i++) {
        html += `<tr><th>${spots[i]}</th>`;
        for (let j = 0; j < n; j++) {
            const v = adjMatrix[i][j];
            html += `<td${v === INF ? ' class="inf"' : ''}>${v === INF ? '∞' : v}</td>`;
        }
        html += '</tr>';
    }
    html += '</tbody></table>';
    document.getElementById('outputArea').innerHTML = html;
    setStatus('📊 已展示邻接矩阵（∞ = ' + INF + ' = 无连通路径）');
}

// ==================== 功能：DFS 导游线路 ====================
function dfsTour() {
    if (spots.length === 0) { alert('请先加载数据'); return; }
    const visited = new Set();
    tourPath = [];

    function dfs(v) {
        visited.add(v);
        tourPath.push(v);
        const neighbors = adjList.get(v) || [];
        for (let { to } of neighbors) {
            if (!visited.has(to)) {
                dfs(to);
                tourPath.push(v);
            }
        }
    }
    dfs(0);

    highlightEdges = [];
    for (let i = 0; i < tourPath.length - 1; i++) {
        const from = tourPath[i], to = tourPath[i + 1];
        if (from !== to) {
            highlightEdges.push({ from, to, color: '#457b9d' });
        }
    }
    drawGraph();

    const visitedCount = new Set(tourPath).size;
    let result = 'DFS 导游线路（从 ' + spots[0] + ' 出发）：\n\n';
    result += '遍历路径（含回溯）：\n  ' + tourPath.map(i => spots[i]).join(' → ') + '\n\n';
    result += '覆盖景点数：' + visitedCount + ' / ' + spots.length + '\n';
    result += '线路步数：' + tourPath.length + ' 步\n';
    if (visitedCount < spots.length) {
        result += '\n⚠️ 以下景点不可达：';
        for (let i = 0; i < spots.length; i++) {
            if (!visited.has(i)) result += spots[i] + '  ';
        }
    }
    outputToArea(result);
    setStatus('🗺️ DFS 导游线路已生成（蓝色高亮边），覆盖 ' + visitedCount + ' 个景点');
}

// ==================== 功能：回路检测 ====================
function detectCycle() {
    if (spots.length === 0) { alert('请先加载数据'); return; }
    if (tourPath.length === 0) { alert('请先生成导游线路（DFS）'); return; }

    const visitCount = {};
    for (let v of tourPath) visitCount[v] = (visitCount[v] || 0) + 1;
    const repeated = Object.entries(visitCount).filter(([k, c]) => c > 1);

    let result = '回路检测结果：\n\n';
    if (repeated.length > 0) {
        result += '⚠️ 导游线路中存在回路！\n\n';
        highlightEdges = [];
        for (let [spotIdx, count] of repeated) {
            const idx = parseInt(spotIdx);
            const positions = [];
            tourPath.forEach((v, i) => { if (v === idx) positions.push(i); });
            for (let i = 0; i < positions.length - 1; i++) {
                const cyclePath = tourPath.slice(positions[i], positions[i + 1] + 1);
                const cycleStr = cyclePath.map(v => spots[v]).join(' → ');
                result += '回路（经过 ' + spots[idx] + '）：\n  ' + cycleStr + '\n  回路长度：' + (cyclePath.length - 1) + ' 步\n\n';
                for (let j = 0; j < cyclePath.length - 1; j++) {
                    highlightEdges.push({ from: cyclePath[j], to: cyclePath[j + 1], color: '#e65100' });
                }
            }
        }
    } else {
        result += '✅ 导游线路中未检测到回路。\n所有景点在导游线路中均只被访问一次。\n';
        highlightEdges = [];
    }
    drawGraph();
    outputToArea(result);
    setStatus(repeated.length > 0 ? '🔁 检测到回路（橙色高亮边）' : '✅ 未检测到回路');
}

// ==================== 功能：Dijkstra 最短路径 ====================
function showDijkstra() {
    const card = document.getElementById('dijkstraCard');
    card.style.display = card.style.display === 'none' ? 'block' : 'none';
    if (card.style.display === 'block') updateSelects();
}

function runDijkstra() {
    const start = parseInt(document.getElementById('dijkFrom').value);
    const end = parseInt(document.getElementById('dijkTo').value);
    if (isNaN(start) || isNaN(end)) { alert('请选择起点和终点'); return; }
    if (start === end) { alert('起点和终点不能相同'); return; }

    const n = spots.length;
    const dist = Array(n).fill(INF);
    const prev = Array(n).fill(-1);
    const visited = Array(n).fill(false);
    dist[start] = 0;

    for (let i = 0; i < n; i++) {
        let u = -1, minDist = INF;
        for (let j = 0; j < n; j++) {
            if (!visited[j] && dist[j] < minDist) { minDist = dist[j]; u = j; }
        }
        if (u === -1) break;
        visited[u] = true;
        for (let { to, weight } of (adjList.get(u) || [])) {
            if (!visited[to] && dist[u] + weight < dist[to]) {
                dist[to] = dist[u] + weight;
                prev[to] = u;
            }
        }
    }

    if (dist[end] === INF) {
        document.getElementById('dijkResult').innerHTML = '❌ ' + spots[start] + ' 和 ' + spots[end] + ' 之间没有连通路径。';
        document.getElementById('dijkResult').style.display = 'block';
        setStatus('❌ 无连通路径');
        return;
    }

    const path = [];
    let cur = end;
    while (cur !== -1) { path.unshift(cur); cur = prev[cur]; }

    highlightEdges = [];
    for (let i = 0; i < path.length - 1; i++) {
        highlightEdges.push({ from: path[i], to: path[i + 1], color: '#e63946' });
    }
    drawGraph();

    const pathStr = path.map(i => spots[i]).join(' → ');
    const resultHtml = '<span class="hili">🔍 最短路径查询结果</span><br><br>' +
        '<strong>起点：</strong>' + spots[start] + ' &nbsp;|&nbsp; <strong>终点：</strong>' + spots[end] + '<br><br>' +
        '<span class="pat">路线：' + pathStr + '</span><br>' +
        '<span class="dis">最短距离：' + dist[end] + '</span>';
    document.getElementById('dijkResult').innerHTML = resultHtml;
    document.getElementById('dijkResult').style.display = 'block';

    let detail = '最短路径（' + spots[start] + ' → ' + spots[end] + '）：\n  路径：' + pathStr + '\n  距离：' + dist[end] + '\n\n途经分段：\n';
    for (let i = 0; i < path.length - 1; i++) {
        const w = adjMatrix[path[i]][path[i + 1]];
        detail += '  ' + spots[path[i]] + ' — ' + spots[path[i + 1]] + ' ：' + w + '\n';
    }
    detail += '  ─────────\n  总距离：' + dist[end];
    outputToArea(detail);
    setStatus('📏 最短路径：' + spots[start] + ' → ' + spots[end] + '，距离 ' + dist[end] + '（红色高亮边）');
}

// ==================== 功能：Prim 最小生成树 ====================
function primMST() {
    if (spots.length === 0) { alert('请先加载数据'); return; }
    const n = spots.length;
    const visited = Array(n).fill(false);
    const mstEdges = [];
    let totalWeight = 0;

    visited[0] = true;
    for (let k = 0; k < n - 1; k++) {
        let minEdge = null, minWeight = INF;
        for (let u = 0; u < n; u++) {
            if (!visited[u]) continue;
            for (let { to, weight } of (adjList.get(u) || [])) {
                if (!visited[to] && weight < minWeight) {
                    minWeight = weight;
                    minEdge = { from: u, to, weight };
                }
            }
        }
        if (!minEdge) break;
        mstEdges.push(minEdge);
        totalWeight += minEdge.weight;
        visited[minEdge.to] = true;
    }

    if (mstEdges.length < n - 1) {
        outputToArea('⚠️ 图不连通，无法生成完整的最小生成树。\n已生成 ' + mstEdges.length + ' 条边。');
        setStatus('⚠️ 图不连通');
    } else {
        let result = '🌳 Prim 最小生成树（扩展功能）\n\n';
        result += 'MST 边列表：\n';
        for (let e of mstEdges) {
            result += '  ' + spots[e.from] + ' — ' + spots[e.to] + '  距离：' + e.weight + '\n';
        }
        result += '\n最小生成树总权重：' + totalWeight + '\n';
        result += '\n💡 最小生成树可用于景区道路建设优化，以最少道路总长度连通所有景点。';
        outputToArea(result);
        setStatus('🌳 最小生成树总权重：' + totalWeight + '（绿色高亮边）');
    }

    highlightEdges = mstEdges.map(e => ({ from: e.from, to: e.to, color: '#2d6a4f' }));
    drawGraph();
}
